name: AnyRouter 自动签到
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install httpx httpx-socks PySocks cryptg

      - name: 执行签到
        env:
          ACCOUNTS: ${{ secrets.ANYROUTER_ACCOUNTS }}
        run: |
          python3 -c "
import json, os, hmac, hashlib, time, urllib.request

accounts = json.loads(os.environ['ACCOUNTS'])

for acct in accounts:
    sess = acct['cookies']['session']
    uid = acct['api_user']
    print(f'=== 签到: {uid} ===')

    # 尝试直接签到
    req = urllib.request.Request(
        'https://anyrouter.top/api/user/sign_in',
        data=b'{}',
        headers={
            'Cookie': f'session={sess}',
            'New-Api-User': str(uid),
            'Content-Type': 'application/json',
            'User-Agent': 'Mozilla/5.0 (compatible; AnyRouter-Checkin/1.0)',
            'Accept': 'application/json',
            'Origin': 'https://anyrouter.top',
            'Referer': 'https://anyrouter.top/',
        }
    )

    try:
        resp = urllib.request.urlopen(req, timeout=15)
        body = resp.read().decode()
        print(f'HTTP {resp.status}: {body[:200]}')

        if 'success' in body and 'true' in body:
            print('✅ 签到成功')
        elif '已签到' in body:
            print('ℹ️ 今天已签到过')
        else:
            print(f'⚠️ 响应: {body[:300]}')
    except urllib.error.HTTPError as e:
        err_body = e.read().decode()[:200]
        print(f'❌ HTTP {e.code}: {err_body}')
        # Try with extra headers if WAF blocked
        if e.code in (403, 503) or 'acw' in err_body:
            print('  可能被 WAF 阻挡，尝试备用方式...')
    except Exception as e:
        print(f'❌ 错误: {e}')
"
