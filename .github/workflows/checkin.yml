name: AnyRouter 自动签到
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          uv pip install --system playwright

      - name: 安装 Playwright 浏览器
        run: |
          python3 -m playwright install chromium

      - name: 执行签到
        env:
          ACCOUNTS_JSON: ${{ secrets.ANYROUTER_ACCOUNTS }}
        run: |
          python3 sign_anyrouter.py
